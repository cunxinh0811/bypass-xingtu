name: Build YOYBypass

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      # Cache cả SDK lẫn toolchain để lần sau nhanh hơn
      - name: Cache SDK + Toolchain
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: |
            theos/sdks
            theos/toolchain
          key: theos-sdk14.5-toolchain-v1

      - name: Download iOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS14.5.sdk.tar.xz" \
            -o sdk.tar.xz
          mkdir -p theos/sdks
          tar -xJf sdk.tar.xz -C theos/sdks/
          rm sdk.tar.xz

      - name: Download iOS Toolchain (clang for ARM64)
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/sbingner/llvm-project/releases/download/v10.0.0-2/linux-ios-arm64e-clang-toolchain.tar.lzma" \
            -o toolchain.tar.lzma
          mkdir -p theos/toolchain/linux/iphone
          tar -xf toolchain.tar.lzma -C theos/toolchain/linux/iphone --strip-components=1
          rm toolchain.tar.lzma
          echo "Toolchain bin:"
          ls theos/toolchain/linux/iphone/bin/ | head -10

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            fakeroot dpkg-dev perl make curl ca-certificates xz-utils \
            libtinfo5

      - name: Install ldid
        run: |
          curl -L \
            "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64" \
            -o ldid
          sudo install -m755 ldid /usr/local/bin/ldid

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make package FINALPACKAGE=1 2>&1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOYBypass-deb
          path: packages/*.deb
          if-no-files-found: error
