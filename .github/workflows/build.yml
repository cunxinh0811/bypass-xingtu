name: Build YOYBypass

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: master
          path: theos
          submodules: recursive

      - name: Cache iOS SDK
        id: cache-sdk
        uses: actions/cache@v4
        with:
          path: theos/sdks
          key: iPhoneOS16.5.sdk-v2

      - name: Download iOS SDK
        if: steps.cache-sdk.outputs.cache-hit != 'true'
        run: |
          curl -L \
            "https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz" \
            -o sdk.tar.xz
          mkdir -p theos/sdks
          tar -xJf sdk.tar.xz -C theos/sdks/
          rm sdk.tar.xz

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            curl perl make xz-utils ca-certificates \
            fakeroot dpkg-dev

      - name: Install ldid
        run: |
          curl -L \
            "https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_linux_x86_64" \
            -o ldid
          sudo install -m755 ldid /usr/local/bin/ldid
          ldid 2>/dev/null || true

      - name: Build
        env:
          THEOS: ${{ github.workspace }}/theos
          THEOS_PACKAGE_SCHEME: rootless
        run: |
          make package FINALPACKAGE=1 2>&1
          echo "--- Built packages ---"
          ls -lh packages/ || echo "(no packages folder)"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: YOYBypass-deb
          path: packages/*.deb
          if-no-files-found: error
